<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; /* Change: Square/Typewriter font */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent;
        }
        #month-pill {
            /* The Text Style */
            font-size: 28px;
            font-weight: bold;
            color: #ffffff; /* White text looks better on olive */
            text-transform: uppercase; /* Makes it look even more square/solid */
            letter-spacing: 2px;
            
            /* The Olive Green Background */
            background-color: #8b9467; /* Olive Green */
            padding: 12px 30px; 
            
            /* The Square Edges */
            border-radius: 2px; /* Change: Almost 0 for sharp square edges */
            
            /* Minimal shadow */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>
    <div id="month-pill"></div>
    <script>
        const monthName = new Date().toLocaleString('en-US', { month: 'long' });
        document.getElementById('month-pill').innerText = monthName;
    </script>
</body>
</html>
