<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent;
        }
        #month {
            font-size: 32px;
            font-weight: bold;
            color: #37352f; /* Notion's default text color */
        }
    </style>
</head>
<body>
    <div id="month"></div>
    <script>
        const monthName = new Date().toLocaleString('en-US', { month: 'long' });
        document.getElementById('month').innerText = monthName;
    </script>
</body>
</html>
